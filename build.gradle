plugins {
    id 'java'
    id 'org.graalvm.buildtools.native' version '0.10.4' apply false
}

group = 'com.arayby'
version = '1.0-SNAPSHOT'

subprojects {
    apply plugin: 'java'

    java {
        sourceCompatibility = JavaVersion.VERSION_25
        targetCompatibility = JavaVersion.VERSION_25
    }

    repositories {
        mavenCentral()
    }

    dependencies {
        testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

        testImplementation 'org.assertj:assertj-core:3.27.3'
        testImplementation 'org.junit.jupiter:junit-jupiter:5.12.2'
    }

    test {
        useJUnitPlatform()
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
        options.compilerArgs += ['--enable-preview']
    }

    tasks.withType(Test).configureEach {
        jvmArgs '--enable-preview'
    }

    tasks.withType(JavaExec).configureEach {
        jvmArgs '--enable-preview'
    }
}

tasks.register('validateChangelog') {
    doLast {
        def changelogFile = rootProject.file('CHANGELOG.md')

        if (!changelogFile.exists()) {
            throw new GradleException('❌ CHANGELOG.md não encontrado na raiz do projeto')
        }

        def changelogContent = changelogFile.text

        if (!changelogContent.contains('[Planejado]')) {
            throw new GradleException('❌ CHANGELOG.md precisa conter a seção [Planejado]')
        }

        def unreleaseStart = changelogContent.indexOf('[Planejado]')
        def nextVersionStart = changelogContent.indexOf('## [', unreleaseStart + 1)

        if (nextVersionStart == -1) {
            nextVersionStart = changelogContent.length()
        }

        def unreleaseSection = changelogContent.substring(unreleaseStart, nextVersionStart)

        def hasEntries = unreleaseSection.contains('\n- ')

        if (!hasEntries) {
            throw new GradleException('❌ CHANGELOG.md seção [Planejado] precisa conter pelo menos uma entrada de mudança')
        }

        logger.quiet('✅ CHANGELOG.md validado com sucesso')
    }
}

subprojects {
    tasks.build.dependsOn rootProject.tasks.validateChangelog
}
