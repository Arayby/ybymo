name: Release

on:
  push:
    tags:
      - 'core-v*'
      - 'cli-v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - name: Repository Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: GraalVM Setup
        uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gradle Cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Gradlew Permissions
        run: chmod +x ./gradlew

      - name: Run Tests
        run: ./gradlew test

      - name: Test Reporter
        uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc
        if: always()
        with:
          name: JUnit Results
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit

  release-core:
    name: Release Core Artifacts
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/core-v')

    steps:
      - name: Repository Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: GraalVM Setup
        uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gradle Cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Gradlew Permissions
        run: chmod +x ./gradlew

      - name: Build Core JAR
        run: ./gradlew :ybymo-core:build -x test

      - name: Extract Core Release Notes
        run: |
          cd ybymo-core
          ../gradlew -q extractReleaseNotes
          cp ../build/release-notes.txt release-notes.txt

      - name: Release Core Artifacts
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: ybymo-core/build/libs/ybymo-core-*.jar
          body_path: ybymo-core/release-notes.txt
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-cli:
    name: Release CLI ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/cli-v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ybymo-cli-linux-amd64.tar.gz
            binary: ybymo-cli/build/native/nativeCompile/ybymo
            bin_name: ybymo

          - os: macos-latest
            artifact: ybymo-cli-macos-arm64.tar.gz
            binary: ybymo-cli/build/native/nativeCompile/ybymo
            bin_name: ybymo

          - os: windows-latest
            artifact: ybymo-cli-windows-amd64.zip
            binary: ybymo-cli/build/native/nativeCompile/ybymo.exe
            bin_name: ybymo.exe

    steps:
      - name: Repository Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: GraalVM Setup
        uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gradle Cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Gradlew Permissions
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build CLI Native Binary
        run: ./gradlew :ybymo-cli:nativeCompile

      - name: Prepare Artifact
        shell: bash
        run: |
          cp ${{ matrix.binary }} ${{ matrix.bin_name }}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a ${{ matrix.artifact }} ${{ matrix.bin_name }}
          else
            tar -czf ${{ matrix.artifact }} ${{ matrix.bin_name }}
          fi

      - name: Extract CLI Release Notes
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd ybymo-cli
          ../gradlew -q extractReleaseNotes
          cp ../build/release-notes.txt release-notes.txt

      - name: Release CLI Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: ${{ matrix.artifact }}
          body_path: ybymo-cli/release-notes.txt
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload CLI Artifact
        if: matrix.os != 'ubuntu-latest'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
