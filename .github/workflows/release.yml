name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    environment: production
    permissions:
      checks: write
      pull-requests: write
      contents: read

    steps:
      - name: Repository Checkout
        uses: actions/checkout@v4

      - name: GraalVM Setup
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Gradlew Permissions
        run: chmod +x ./gradlew

      - name: Run Tests
        run: ./gradlew test

      - name: Test Reporter
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Results
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit

  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    environment: production
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ybymo-linux-amd64.tar.gz
            binary: ybymo-cli/build/native/nativeCompile/ybymo
            bin_name: ybymo

          - os: macos-latest
            artifact: ybymo-macos-arm64.tar.gz
            binary: ybymo-cli/build/native/nativeCompile/ybymo
            bin_name: ybymo

          - os: windows-latest
            artifact: ybymo-windows-amd64.zip
            binary: ybymo-cli/build/native/nativeCompile/ybymo.exe
            bin_name: ybymo.exe

    steps:
      - name: Repository Checkout
        uses: actions/checkout@v4

      - name: GraalVM Setup
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Gradlew Permissions
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build Binary
        run: ./gradlew :ybymo-cli:nativeCompile

      - name: Prepare Artifact
        shell: bash
        run: |
          cp ${{ matrix.binary }} ${{ matrix.bin_name }}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a ${{ matrix.artifact }} ${{ matrix.bin_name }}
          else
            tar -czf ${{ matrix.artifact }} ${{ matrix.bin_name }}
          fi

      - name: Extract Notes
        if: matrix.os == 'ubuntu-latest'
        id: release_notes
        run: ./gradlew -q extractReleaseNotes 2>&1 | tail -1 > release-notes.txt

      - name: Read Notes
        if: matrix.os == 'ubuntu-latest'
        id: notes
        run: echo "body=$(cat release-notes.txt | jq -Rs .)" >> $GITHUB_OUTPUT

      - name: Release Artifact
        if: matrix.os == 'ubuntu-latest' || github.event.inputs.skip_matrix == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        if: matrix.os != 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
