name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Repository Checkout
        uses: actions/checkout@v4

      - name: GraalVM Setup
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Gradlew Permissions
        run: chmod +x ./gradlew

      - name: Run Tests
        run: ./gradlew test

      - name: Test Reporter
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Results
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit

  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ybymo-linux
            binary: ybymo-cli/build/native/nativeCompile/ybymo

          - os: macos-latest
            artifact: ybymo-macos
            binary: ybymo-cli/build/native/nativeCompile/ybymo

          - os: windows-latest
            artifact: ybymo-windows.exe
            binary: ybymo-cli/build/native/nativeCompile/ybymo.exe

    steps:
      - name: Repository Checkout
        uses: actions/checkout@v4

      - name: GraalVM Setup
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Gradlew Permissions
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build Binary
        run: ./gradlew :ybymo-cli:nativeCompile

      - name: Prepare Artifact
        shell: bash
        run: cp ${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Release Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
