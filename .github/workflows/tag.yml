name: Tag

on:
  push:
    branches: [ main ]
    paths:
      - 'CHANGELOG.md'
      - 'build.gradle'

jobs:
  create-tag:
    name: Create Tag
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write

    steps:
      - name: Repository Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GraalVM Setup
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Gradlew Permissions
        run: chmod +x ./gradlew

      - name: Validate Sync
        run: ./gradlew validateChangelog validateVersionSync

      - name: Extract Release Version
        id: extract_version
        run: |
          ./gradlew -q extractVersion
          VERSION=$(cat build/version.txt)
          if [ -z "$VERSION" ]; then
            echo "❌ Falha ao extrair versão de release do CHANGELOG.md"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check Tag
        id: check_tag
        run: |
          TAG="v${{ steps.extract_version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Tag $TAG já existe. Nada para criar."
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
            echo "✅ Tag $TAG disponível para criação"
          fi

      - name: Create Tag
        if: steps.check_tag.outputs.tag_exists == 'false'
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          TAG="v$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" -m "Release $VERSION"
          git push origin "$TAG"
