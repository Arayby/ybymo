def validateChangelog = tasks.register('validateChangelog')
def validateVersionSync = tasks.register('validateVersionSync')
def extractVersion = tasks.register('extractVersion')
def extractReleaseNotes = tasks.register('extractReleaseNotes')

validateChangelog.configure {
    doLast {
        def changelogFile = rootProject.file('CHANGELOG.md')

        if (!changelogFile.exists()) {
            throw new GradleException('❌ CHANGELOG.md não encontrado na raiz do projeto')
        }

        def changelogContent = changelogFile.text

        def snapshotHeaderPattern = /^## \[((\d+\.\d+\.\d+|X\.Y\.Z)-SNAPSHOT)]/
        def topSnapshotVersion = null

        for (String line : changelogContent.split('\n')) {
            def matcher = line =~ snapshotHeaderPattern
            if (matcher.find()) {
                topSnapshotVersion = matcher.group(1)
                break
            }
        }

        if (topSnapshotVersion == null) {
            throw new GradleException('❌ CHANGELOG.md precisa iniciar com uma seção de desenvolvimento no formato ## [X.Y.Z-SNAPSHOT]')
        }

        logger.quiet("✅ CHANGELOG.md validado com sucesso (${topSnapshotVersion})")
    }
}

validateVersionSync.configure {
    doLast {
        def changelogFile = rootProject.file('CHANGELOG.md')
        def buildFile = rootProject.file('build.gradle')

        if (!changelogFile.exists()) {
            throw new GradleException('❌ CHANGELOG.md não encontrado')
        }

        if (!buildFile.exists()) {
            throw new GradleException('❌ build.gradle não encontrado')
        }

        def changelogContent = changelogFile.text
        def buildContent = buildFile.text

        def changelogSnapshotPattern = /^## \[((\d+\.\d+\.\d+|X\.Y\.Z)-SNAPSHOT)\]/
        def changelogSnapshotVersion = null

        for (String line : changelogContent.split('\n')) {
            def matcher = line =~ changelogSnapshotPattern
            if (matcher.find()) {
                changelogSnapshotVersion = matcher.group(1)
                break
            }
        }

        def buildPattern = /version\s*=\s*['"]([^'"]+)['"]/
        def buildVersion = null
        def matcher = buildContent =~ buildPattern
        if (matcher.find()) {
            buildVersion = matcher.group(1)
        }

        if (!changelogSnapshotVersion) {
            throw new GradleException('❌ Nenhuma seção SNAPSHOT encontrada no CHANGELOG.md. Formato esperado: ## [X.Y.Z-SNAPSHOT]')
        }

        if (!buildVersion) {
            throw new GradleException('❌ Versão não encontrada no build.gradle')
        }

        if (changelogSnapshotVersion == 'X.Y.Z-SNAPSHOT') {
            logger.quiet("✅ Versionamento sincronizado: CHANGELOG=[${changelogSnapshotVersion}] (placeholder ativo)")
            return
        }

        if (buildVersion != changelogSnapshotVersion) {
            throw new GradleException("""❌ VERSÕES DESALINHADAS:
   CHANGELOG: [${changelogSnapshotVersion}]
   build.gradle: ${buildVersion}

   ℹ️  build.gradle deve estar exatamente igual à seção SNAPSHOT ativa do CHANGELOG.""")
        }

        logger.quiet("✅ Versionamento sincronizado: CHANGELOG=[${changelogSnapshotVersion}], build.gradle=${buildVersion}")
    }
}

extractVersion.configure {
    def versionFile = file("${layout.buildDirectory.get()}/version.txt")
    outputs.file(versionFile)

    doLast {
        def changelogFile = rootProject.file('CHANGELOG.md')

        if (!changelogFile.exists()) {
            throw new GradleException('❌ CHANGELOG.md não encontrado na raiz do projeto')
        }

        def changelogContent = changelogFile.text
        def pattern = /^## \[(\d+\.\d+\.\d+)\]/
        def version = null

        for (String line : changelogContent.split('\n')) {
            if (version == null) {
                def matcher = line =~ pattern
                if (matcher.find()) {
                    version = matcher.group(1)
                    break
                }
            }
        }

        if (version == null) {
            throw new GradleException('❌ Nenhuma versão de release encontrada no CHANGELOG.md. Formato esperado: ## [X.Y.Z]')
        }

        logger.quiet("✅ Versão extraída do CHANGELOG: $version")

        versionFile.parentFile.mkdirs()
        versionFile.text = version

        println(version)
    }
}

extractReleaseNotes.configure {
    def notesFile = file("${layout.buildDirectory.get()}/release-notes.txt")
    outputs.file(notesFile)

    doLast {
        def changelogFile = rootProject.file('CHANGELOG.md')

        if (!changelogFile.exists()) {
            throw new GradleException('❌ CHANGELOG.md não encontrado na raiz do projeto')
        }

        def changelogContent = changelogFile.text
        def lines = changelogContent.split('\n')

        def releaseNotes = new StringBuilder()
        def captureNotes = false
        def sectionCount = 0

        for (String line : lines) {
            if (line =~ /^## \[\d+\.\d+\.\d+]/) {
                if (sectionCount == 0) {
                    captureNotes = true
                    sectionCount++
                    continue
                } else {
                    break
                }
            }

            if (captureNotes && (line == '---' || line =~ /^## \[/)) {
                break
            }

            if (captureNotes && line.trim()) {
                releaseNotes.append(line).append('\n')
            } else if (captureNotes && !line.trim()) {
                releaseNotes.append('\n')
            }
        }

        if (releaseNotes.length() == 0) {
            throw new GradleException('❌ Nenhuma nota de release encontrada no CHANGELOG.md')
        }

        logger.quiet('✅ Notas de release extraídas com sucesso')

        notesFile.parentFile.mkdirs()
        notesFile.text = releaseNotes.toString().trim()

        println(releaseNotes.toString().trim())
    }
}
